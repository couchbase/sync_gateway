parameters:
  - $ref: ../../components/parameters.yaml#/keyspace
get:
  summary: Get Channel History of Document
  description: |-
    Retrieves all inactive channels in the channel history before a particular sequence number.

    Required Sync Gateway RBAC roles:

    * Sync Gateway Application
    * Sync Gateway Application Read Only
  parameters:
    - name: doc_id
      in: query
      description: The document ID whose channel history should be retrieved.
      required: true
      schema:
        type: string
      example: doc1
    - name: seq
      in: query
      description: |-
        The sequence number threshold. All inactive channels with history entries for sequences before this number
        (sequences at which the document left the channel) will be returned.
      required: true
      schema:
        type: number
      example: 12345
  responses:
    '200':
      description: |-
        Successfully retrieved inactive channel history for the specified document.
        Returns a mapping of the document ID to the list of inactive channels that have history before the sequence number.
      content:
        application/json:
          schema:
            type: object
            additionalProperties:
              x-additionalPropertiesName: doc_id
              type: array
              items:
                type: string
              description: |-
                Array of inactive channel names that have history entries before the specified sequence number.
            description: |-
              A mapping of document ID (key) to arrays of inactive channels (values).
            example:
              doc1:
                - channel1
                - channel2
    '400':
      description: 'Bad request. This could be due to missing or invalid query parameters such as missing doc_id or invalid seq value.'
      content:
        application/json:
          schema:
            $ref: ../../components/schemas.yaml#/HTTP-Error
    '403':
      $ref: ../../components/responses.yaml#/Unauthorized-database

  tags:
    - Document
  operationId: get_keyspace-_history
