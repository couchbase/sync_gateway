parameters:
  - $ref: ../../components/parameters.yaml#/db
  - $ref: ../../components/parameters.yaml#/user-name
post:
  summary: Prune user's channels
  description: |-
    Remove specified channels from a user's channel access. The request specifies which channels should be compacted from the user's admin_channels and collection_access.

    Required Sync Gateway RBAC roles:

    * Sync Gateway Architect
  requestBody:
    description: Channels to be pruned from the user
    content:
      application/json:
        schema:
          $ref: ../../components/schemas.yaml#/UserChannelPruneRequest
        example:
          admin_channels:
            - channel2
          collection_access:
            scope1:
              collection1:
                admin_channels:
                  - scoped_channel1
  responses:
    '200':
      description: Channels pruned successfully from user
      content:
        application/json:
          schema:
            $ref: ../../components/schemas.yaml#/UserChannelInfo
          example:
            collection_access:
              scope1:
                collection1:
                  admin_channels: []
                  all_channels:
                    - scoped_channel2
    '400':
      description: Bad request. Invalid channel names or malformed request body.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas.yaml#/HTTP-Error
          example:
            error: "Bad Request"
            reason: "Invalid channel format: channels must be non-empty strings"
    '403':
      $ref: ../../components/responses.yaml#/Unauthorized-database
    '404':
      $ref: ../../components/responses.yaml#/Not-found
  tags:
    - Database Security
  operationId: post_db-_user-name-_history-compact
