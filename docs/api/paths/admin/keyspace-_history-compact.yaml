parameters:
  - $ref: ../../components/parameters.yaml#/keyspace
post:
  summary: Compact Channel History of Document
  description: |-
    Compacts inactive channel history entries from one or more documents before a specified sequence number.

    This endpoint removes all inactive channel entries (for sequences before the specified sequence number where the document left the channel),
    effectively cleaning up historical channel membership information while preserving active channels and recent changes.
    This is useful for reducing storage overhead when maintaining large document histories.

    Required Sync Gateway RBAC roles:

    * Sync Gateway Architect
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            doc_ids:
              description: |-
                List of document IDs whose inactive channel history should be compacted.
                Only the inactive channel entries for these specific documents will be affected.
                Other documents and active channels in the keyspace will not be modified.
              type: array
              items:
                type: string
              example:
                - doc1
                - doc2
            seq:
              description: |-
                The sequence number threshold. Inactive channel entries for sequences before this number
                (sequences at which the document left the channel) will be removed from the specified documents.
                Active channels and inactive channel entries at or after this sequence number will be preserved.
                This allows you to clean up old history while keeping recent changes intact.
              type: number
              example: 12345
  responses:
    '200':
      description: |-
        Successfully compacted channel history from the specified documents.
        Returns a mapping of document IDs to the list of channels that were compacted.

        If a document ID has an empty array, it means no channels were pruned for that document.

      content:
        application/json:
          schema:
            type: object
            additionalProperties:
              x-additionalPropertiesName: doc_id
              type: array
              items:
                type: string
              description: |-
                Array of channel names that were compacted.
            description: |-
              A mapping of document IDs (keys) to arrays of compacted channels (values).
            example:
              doc1:
                - channel1
                - channel2
              doc2:
                - channel2
                - channel3
    '400':
      description: 'Bad request. This could be due to invalid request parameters such as missing or malformed doc_ids array or invalid seq value.'
      content:
        application/json:
          schema:
            $ref: ../../components/schemas.yaml#/HTTP-Error
    '403':
      $ref: ../../components/responses.yaml#/Unauthorized-database

  tags:
    - Document
  operationId: post_keyspace-_history-compact
